<body>

<div id="sidebar-container">
    <div id="open-sidebar" onclick="toggleSidebar()" style="display: none"></div>
    <div id="sidebar">
        <div id="sidebar-toolbar">
            <button id="new-file" title="New file" onclick="newFile()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 32 32">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 25V7M7 16h18"/>
                </svg>
            </button>
            <button id="new-folder" title="New folder" onclick="newFolder()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 32 32">
                    <path stroke-linecap="round" stroke-width="2" d="M28 11v13a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h6c3 0 3 3 5 3h9.003C27.108 9 28 9.895 28 11z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 21v-8M12 17h8"/>
                </svg>
            </button>
            <button id="open-chat" onclick="openChat()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 34 32">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M 25 7 H 11 a 4 4 0 0 0 -4 4 v 10 a 4 4 0 0 0 4 4 h 7 l 6 4 v -4 h 1 a 4 4 0 0 0 4 -4 V 11 a 4 4 0 0 0 -4 -4 z"/>
                </svg>
            </button>
            <!--        <button id="move-file" title="Move file" onclick="openMoveModal()">-->
            <!--            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 32 32">-->
            <!--                <path stroke="#535358" stroke-linecap="round" stroke-width="2" d="M5 16h21"/>-->
            <!--                <path stroke="#535358" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 8l8 8-8 8"/>-->
            <!--            </svg>-->
            <!--        </button>-->
            <!--        <button id="remove-file" title="Delete file" onclick="removeFile(toPath(editor.currentDir, editor.currentFile))">-->
            <!--            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 32 32">-->
            <!--                <ellipse cx="16" cy="8" stroke="#535358" stroke-linejoin="round" stroke-width="2" rx="11" ry="3"/>-->
            <!--                <path stroke="#535358" stroke-linejoin="round" stroke-width="2" d="M5 8l3 18s1 2 8 2 8-2 8-2l3-18"/>-->
            <!--                <path stroke="#535358" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.5 16.5l-5 5M13.5 16.5l5 5"/>-->
            <!--            </svg>-->
            <!--        </button>-->
            <button id="open-folder" title="Select local folder" onClick="openDir()" style="padding: 5px">
                Open or create folder
            </button>
            <button id="close-sidebar" onclick="toggleSidebar()">×</button>
        </div>
        <div id="sidebar-tree">
        </div>
    </div>
    <div class="resize-handle"
         role="separator"
         tabindex="0"
         aria-label="Resize sidebar with mouse"
         aria-orientation="vertical">
    </div>
</div>

<div id="content">
    <div id="editor-container">
        <textarea id="editor-textarea" style="display: none"></textarea>
    </div>
    <div id="editor2-container" style="display: none">
        <textarea id="editor2-textarea" style="display: none"></textarea>
        <button id="close-editor2" onclick="hideEditor2()">×</button>
    </div>
    <div id="chat-container" style="display: none">
        <div id="chat" style="display: none;"></div>
        <textarea id="chat-input" style="display: none;" class="input-field" placeholder="Type your message..." rows="1"></textarea>
        <button id="close-chat" onclick="closeChatModal()" title="Close chat" style="display: none">×</button>
        <button id="fullscreen-chat" onclick="openChat()" title="Toggle fullscreen" style="display: none">⛶</button>
    </div>

    <button class="hidden" id="open-chat-modal" style="display: none" title="Open Chat" onclick="toggleChat()">
        <svg style="display: none" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 34 32">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M 25 7 H 11 a 4 4 0 0 0 -4 4 v 10 a 4 4 0 0 0 4 4 h 7 l 6 4 v -4 h 1 a 4 4 0 0 0 4 -4 V 11 a 4 4 0 0 0 -4 -4 z"/>
        </svg>
    </button>
</div>

<div id="search" style="display: none;">
    <form autocomplete="off">
        <input type="text" id="search-input" placeholder="Go to file..." oninput="searchModal.search()">
    </form>
    <ul id="search-results"></ul>
</div>
<div id="move" style="display: none;">
    <form autocomplete="off">
        <input type="text" id="move-input" placeholder="Move to folder..." oninput="moveModal.suggestMove()">
    </form>
    <ul id="move-results"></ul>
</div>
<script src="app.js?v="></script>
<script src="wasm.js?v="></script>
<script src="chat.js?v="></script>
<script src="modals.js?v="></script>

</script>
